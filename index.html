<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Painel de Rotinas da Casa</title>
<style>
  /* Reset básico para evitar quebras no mobile */
  * { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f4f7f6;
    color: #333;
    margin: 0;
    padding: 15px; /* Reduzido para ganhar espaço no celular */
  }
  .container {
    max-width: 650px;
    margin: 0 auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  h2 {
    text-align: center;
    color: #2c3e50;
    margin-top: 0;
    font-size: 1.5em;
  }
  
  /* Estilos do Formulário */
  .add-task-form {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 2px dashed #ecf0f1;
  }
  
  /* REGRA ANTI-ZOOM: font-size: 16px obrigatório */
  .add-task-form input[type="text"],
  .add-task-form input[type="number"],
  .add-task-form select {
    padding: 12px; /* Maior área de toque */
    border: 1px solid #bdc3c7;
    border-radius: 5px;
    font-size: 16px; 
    width: 100%;
  }

  .add-task-form input[type="text"] { flex: 3; min-width: 200px; }
  .add-task-form input[type="number"] { flex: 1; min-width: 80px; }
  .add-task-form select { flex: 2; }
  
  .add-task-form button {
    flex: 1;
    min-width: 100px;
    padding: 12px;
    background: #3498db;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
  }
  .add-task-form button:hover { background: #2980b9; }
  .add-task-form .cancel-btn { background: #95a5a6; display: none; }
  .add-task-form .cancel-btn:hover { background: #7f8c8d; }

  /* Lista de Tarefas */
  .task {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    margin-bottom: 12px;
    border-left: 5px solid #bdc3c7;
    border-radius: 6px;
    background: #fafafa;
    transition: all 0.3s ease;
  }
  .task-info { flex: 1; }
  .task-info h3 { margin: 0 0 5px 0; font-size: 1.1em; display: flex; align-items: center; flex-wrap: wrap; gap: 8px;}
  .task-info p { margin: 0; font-size: 0.9em; color: #7f8c8d; }
  
  /* Badges de Prioridade */
  .badge {
    font-size: 0.7em;
    padding: 4px 6px;
    border-radius: 4px;
    color: white;
    font-weight: bold;
    text-transform: uppercase;
  }
  .badge-1 { background-color: #95a5a6; }
  .badge-2 { background-color: #f39c12; }
  .badge-3 { background-color: #8e44ad; }

  /* Alertas Visuais da Tarefa */
  .task.urgent { border-left-color: #e74c3c; background: #fadbd8; }
  .task.urgent h3, .task.urgent p strong { color: #c0392b; }
  .task.warning { border-left-color: #f39c12; background: #fcf3cf; }
  .task.warning h3, .task.warning p strong { color: #d35400; }
  .task.normal { border-left-color: #2ecc71; }
  
  /* Botões de Ação */
  .actions { display: flex; gap: 6px; }
  .btn-done { background: #2ecc71; color: white; border: none; padding: 10px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;}
  .btn-edit { background: #f1c40f; color: #333; border: none; padding: 10px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;}
  .btn-del { background: #e74c3c; color: white; border: none; padding: 10px 14px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;}

  /* OTIMIZAÇÃO PARA TELAS PEQUENAS (SMARTPHONES) */
  @media (max-width: 600px) {
    .add-task-form {
      flex-direction: column; /* Empilha os campos */
    }
    .add-task-form input[type="text"],
    .add-task-form input[type="number"],
    .add-task-form select,
    .add-task-form button {
      flex: none; /* Remove a proporção do flex */
      width: 100%; /* Ocupa a largura total */
    }
    .task {
      flex-direction: column;
      align-items: flex-start;
      gap: 15px;
    }
    .actions {
      width: 100%;
      justify-content: flex-end; /* Alinha os botões à direita no celular */
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
    .btn-done { flex: 1; } /* Faz o botão de "Feito" ficar maior no mobile */
  }
</style>
</head>
<body>

<div class="container">
  <h2>Gestão Silenciosa da Casa</h2>
  
  <form class="add-task-form" id="taskForm" onsubmit="salvarTarefaForm(event)">
    <input type="hidden" id="editId">
    <input type="text" id="novaTarefaNome" placeholder="Ex: Lavar roupas" required>
    
    <input type="number" id="novaTarefaCiclo" placeholder="Dias" min="1" title="Prazo em dias" required>
    
    <select id="novaTarefaPrioridade">
      <option value="1">Básico (Peso 1)</option>
      <option value="2">Urgente (Peso 2)</option>
      <option value="3">Extr. Urgente (Peso 3)</option>
    </select>
    
    <button type="submit" id="btnSubmit">+ Adicionar</button>
    <button type="button" class="cancel-btn" id="btnCancel" onclick="cancelarEdicao()">Cancelar</button>
  </form>

  <div id="taskList"></div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('gerenciadorRotinaV2')) || [];
  
  tasks.forEach(t => { if(!t.priority) t.priority = 1; });

  function salvarERenderizar() {
    localStorage.setItem('gerenciadorRotinaV2', JSON.stringify(tasks));
    renderizarTarefas();
  }

  function salvarTarefaForm(event) {
    event.preventDefault();
    
    const idEditando = document.getElementById('editId').value;
    const nome = document.getElementById('novaTarefaNome').value.trim();
    const ciclo = parseInt(document.getElementById('novaTarefaCiclo').value);
    const prioridade = parseInt(document.getElementById('novaTarefaPrioridade').value);

    // Esconde o teclado no celular após adicionar
    document.getElementById('novaTarefaNome').blur();
    document.getElementById('novaTarefaCiclo').blur();

    if (nome && ciclo > 0) {
      if (idEditando) {
        const index = tasks.findIndex(t => t.id == idEditando);
        if(index !== -1) {
          tasks[index].name = nome;
          tasks[index].cycle = ciclo;
          tasks[index].priority = prioridade;
        }
      } else {
        const novaTarefa = {
          id: Date.now(),
          name: nome,
          cycle: ciclo,
          priority: prioridade,
          lastDone: Date.now()
        };
        tasks.push(novaTarefa);
      }
      
      cancelarEdicao();
      salvarERenderizar();
    }
  }

  function marcarComoFeito(id) {
    const task = tasks.find(t => t.id === id);
    if(task) {
      task.lastDone = Date.now(); 
      salvarERenderizar();
    }
  }

  function editarTarefa(id) {
    const task = tasks.find(t => t.id === id);
    if(task) {
      document.getElementById('editId').value = task.id;
      document.getElementById('novaTarefaNome').value = task.name;
      document.getElementById('novaTarefaCiclo').value = task.cycle;
      document.getElementById('novaTarefaPrioridade').value = task.priority || 1;
      
      document.getElementById('btnSubmit').innerText = "Atualizar";
      document.getElementById('btnCancel').style.display = "block";
      
      // Rola a tela para o topo suavemente no celular para ver o formulário
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  function excluirTarefa(id) {
    if(confirm("Tem certeza que quer excluir essa tarefa?")) {
      tasks = tasks.filter(t => t.id !== id);
      salvarERenderizar();
    }
  }

  function cancelarEdicao() {
    document.getElementById('taskForm').reset();
    document.getElementById('editId').value = "";
    document.getElementById('btnSubmit').innerText = "+ Adicionar";
    document.getElementById('btnCancel').style.display = "none";
  }

  function getBadgeHtml(priority) {
    if (priority === 3) return `<span class="badge badge-3">Extr. Urgente</span>`;
    if (priority === 2) return `<span class="badge badge-2">Urgente</span>`;
    return `<span class="badge badge-1">Básico</span>`;
  }

  function renderizarTarefas() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    if (tasks.length === 0) {
      list.innerHTML = '<p style="text-align:center; color:#7f8c8d; padding: 20px;">Sua lista está limpa. Adicione uma tarefa.</p>';
      return;
    }

    const agora = Date.now();
    const msPorDia = 86400000;

    tasks.forEach(task => {
      const diasPassados = Math.floor((agora - task.lastDone) / msPorDia);
      task.diasRestantes = task.cycle - diasPassados;
      
      if (task.diasRestantes < 0) task.status = 'urgent';
      else if (task.diasRestantes === 0) task.status = 'warning';
      else task.status = 'normal';
    });

    tasks.sort((a, b) => {
      if (a.diasRestantes !== b.diasRestantes) return a.diasRestantes - b.diasRestantes;
      const prioA = a.priority || 1;
      const prioB = b.priority || 1;
      if (prioB !== prioA) return prioB - prioA;
      return a.lastDone - b.lastDone;
    });

    tasks.forEach(task => {
      const div = document.createElement('div');
      div.className = `task ${task.status}`;
      
      let textoStatus = `${task.diasRestantes} dias restantes`;
      if (task.diasRestantes < 0) textoStatus = `ATRASADO (${Math.abs(task.diasRestantes)} dias)`;
      else if (task.diasRestantes === 0) textoStatus = 'Fazer Hoje!';

      div.innerHTML = `
        <div class="task-info">
          <h3>${task.name} ${getBadgeHtml(task.priority)}</h3>
          <p>A cada ${task.cycle} dias | <strong>${textoStatus}</strong></p>
        </div>
        <div class="actions">
          <button class="btn-done" onclick="marcarComoFeito(${task.id})" title="Marcar como feito">✓ Feito</button>
          <button class="btn-edit" onclick="editarTarefa(${task.id})" title="Editar">✎</button>
          <button class="btn-del" onclick="excluirTarefa(${task.id})" title="Excluir">✗</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  renderizarTarefas();
</script>

</body>
</html>
